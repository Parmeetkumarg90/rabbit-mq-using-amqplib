name: "outbox-inbox-and-resillient-pattern-for-message"

services:
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always
    volumes:
      - rmq_data:/var/lib/rabbitmq/data

  database:
    image: postgres:14-alpine
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - ./consumer/.env
    volumes:
      - rmq_pg_data:/var/lib/postgresql/data

  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    command: sh -c "npm run build && npm run migration:run && npm run start:dev"
    depends_on:
      - database
    env_file:
      - ./producer/.env

  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    command: sh -c "npm run build && npm run start:dev"
    depends_on:
      - database
    env_file:
      - ./consumer/.env

volumes:
  rmq_pg_data: {}
  rmq_data: {}